<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello World!</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      .app,
      body {
        width: 100vh;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .app webview {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <webview
        id="myWebview"
        src="https://ai.example.com/"
      ></webview>
    </div>
    <script type="module" src="/src/renderer.ts"></script>
    <script>
      const webview = document.getElementById("myWebview");
      webview.addEventListener("dom-ready", async () => {
        await new Promise((r) => setTimeout(r, 2000));
        webview.executeJavaScript(`

           async function runTask() {
             const hi = document.querySelectorAll("textarea");
              if (hi.length) {
                  const element = hi[0]  
                  element.dispatchEvent(new Event("focus", {bubbles: true})); 
                  element.value = '帮我出一份北京市朝阳区小学四年级期末开始联系题 要求返回json数据结构 用试题start  试题end 包裹json数据' 
                  element.dispatchEvent(new Event("input", {bubbles: true})); 
                  document.querySelector("#ci-submit-button-ai").click()
                  await new Promise((r) => setTimeout(r, 6000));
                  const arr = document.querySelectorAll(".marklang-paragraph")
                  const lastQuestion = arr[arr.length - 1]
                  alert(lastQuestion.innerHTML)
                  window.electronAPI.sendToHost("end", lastQuestion)
              }
           }

           runTask()
          
          `);

          webview.addEventListener("ipc-message", (event) => {
            console.log(event)
          })
      });
    </script>
  </body>
</html>
